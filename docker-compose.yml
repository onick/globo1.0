services:
  traccar:
    image: traccar/traccar:latest
    ports:
      - "8082:8082"
      - "5001-5150:5001-5150"
    volumes:
      - ./docker/traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar-data:/opt/traccar/data
    depends_on:
      traccar-db:
        condition: service_healthy
    restart: always

  traccar-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: traccar
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: ${TRACCAR_DB_PASSWORD:-traccar_secret}
    volumes:
      - traccar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traccar"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: globo
      POSTGRES_USER: globo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-globo_secret}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U globo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - traccar
    restart: always

volumes:
  traccar-data:
  traccar-db-data:
  db-data:
  redis-data:
